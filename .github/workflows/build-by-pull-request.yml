name: PR Build Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APKs
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_PRIMARY_SERVERS_URL: ${{ vars.PRIMARY_SERVERS_URL }}
      ORG_GRADLE_PROJECT_FALLBACK_SERVERS_URL: ${{ vars.FALLBACK_SERVERS_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set build metadata
        id: build_meta
        run: |
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install swig
        run: |
          sudo apt-get update
          sudo apt-get install -y swig
          swig -version

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;29.0.14206865"
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./src

      - name: Run Unit Tests (app)
        run: ./gradlew testDebugUnitTestApp --stacktrace
        working-directory: ./src

      - name: Upload Unit Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            src/**/build/reports/tests/testDebugUnitTest/**
            src/**/build/test-results/testDebugUnitTest/**

      - name: Build Debug APKs (mobile + tv)
        run: ./gradlew :mobile:assembleDebug :tv:assembleDebug --stacktrace
        working-directory: ./src

      - name: Rename APKs with commit SHA
        run: |
          set -e
          for apk in src/mobile/build/outputs/apk/debug/*.apk; do
            [ -e "$apk" ] || continue
            base="$(basename "$apk" .apk)"
            mv "$apk" "$(dirname "$apk")/${base}_${SHORT_SHA}.apk"
          done
          for apk in src/tv/build/outputs/apk/debug/*.apk; do
            [ -e "$apk" ] || continue
            base="$(basename "$apk" .apk)"
            mv "$apk" "$(dirname "$apk")/${base}_${SHORT_SHA}.apk"
          done

      - name: Upload Debug APK (mobile)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-mobile-debug_${{ steps.build_meta.outputs.short_sha }}
          path: src/mobile/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Debug APK (tv)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-tv-debug_${{ steps.build_meta.outputs.short_sha }}
          path: src/tv/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Comment PR with APK links
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request context. Skipping comment.');
              return;
            }
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const sha = pr.head?.sha || context.sha;
            const shortSha = sha.substring(0, 7);

            const commitResp = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: sha,
            });
            const commitTitle =
              commitResp?.data?.commit?.message?.split('\n')[0] || 'unknown';

            const artifactsResp = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runId,
            });
            const artifacts = artifactsResp.data.artifacts || [];
            const byName = (name) => artifacts.find((a) => a.name === name);
            const mobile = byName(`apk-mobile-debug_${shortSha}`);
            const tv = byName(`apk-tv-debug_${shortSha}`);

            const toLink = (artifact) =>
              artifact
                ? `[${artifact.name}](https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id})`
                : '_not found_';

            const body = [
              `Build artifacts for commit \`${sha}\` (${commitTitle}):`,
              `- Mobile APK: ${toLink(mobile)}`,
              `- TV APK: ${toLink(tv)}`,
              `Run: https://github.com/${owner}/${repo}/actions/runs/${runId}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body,
            });
