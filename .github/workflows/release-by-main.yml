name: Release from Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-build-number
  cancel-in-progress: false

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_PRIMARY_SERVERS_URL: ${{ vars.PRIMARY_SERVERS_URL }}
      ORG_GRADLE_PROJECT_FALLBACK_SERVERS_URL: ${{ vars.FALLBACK_SERVERS_URL }}
      VERSIONS_API_BASE_URL: ${{ vars.VERSIONS_API_BASE_URL }}
      VERSIONS_API_KEY: ${{ secrets.VERSIONS_API_KEY }}
      RELEASE_NOTES_AUTO_TRANSLATE_LANGUAGES_JSON: '["en","ru","pl"]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Install swig
        run: |
          sudo apt-get update
          sudo apt-get install -y swig
          swig -version

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Version
        id: versioning
        shell: bash
        run: |
          set -e
          STABLE_TAG=$(git tag --list 'v1.*' | grep -v 'beta' | sort -Vr | head -n 1) || true
          if [[ -z "$STABLE_TAG" ]]; then
            MAJOR=1
            MINOR=0
            PATCH=0
            VERSION="1.0.0"
            echo "==> No stable tag found, starting with ${VERSION}."
          else
            CLEAN_TAG=$(echo "${STABLE_TAG#v}" | sed -E 's/-auto\([0-9]+\)$//' | sed -E 's/\([0-9]+\)$//')
            IFS='.' read -r MAJOR MINOR PATCH <<< "${CLEAN_TAG}"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "==> Base on latest stable tag ${STABLE_TAG}; next version ${VERSION}."
          fi
          LAST_USED_BUILD=$(git tag --list | sed -nE 's/.*-auto\(([0-9]+)\)$/\1/p' | sort -n | tail -n 1)
          LAST_USED_BUILD=${LAST_USED_BUILD:-0}
          VERSION_CODE_MOBILE=$((LAST_USED_BUILD + 1))
          VERSION_CODE_TV=$((LAST_USED_BUILD + 2))
          TAG="v${VERSION}-auto(${VERSION_CODE_TV})"
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "==> App version: $VERSION"
          echo "==> Git tag: $TAG"
          echo "==> App versionCode: mobile=${VERSION_CODE_MOBILE} tv=${VERSION_CODE_TV}"
          echo "==> Last used build number: ${LAST_USED_BUILD}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version_code_mobile=${VERSION_CODE_MOBILE}" >> $GITHUB_OUTPUT
          echo "version_code_tv=${VERSION_CODE_TV}" >> $GITHUB_OUTPUT
          echo "build_number_mobile=${VERSION_CODE_MOBILE}" >> $GITHUB_OUTPUT
          echo "build_number_tv=${VERSION_CODE_TV}" >> $GITHUB_OUTPUT
          {
            echo 'last_commit<<EOF'
            echo "$LAST_COMMIT_MSG"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Decode Keystore
        run: |
          echo "Decoding signing key..."
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > keystore.jks
          
          echo "Creating keystore.properties file..."
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> keystore.properties
          echo "storeFile=keystore.jks" >> keystore.properties
        working-directory: ./src

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./src

      - name: Stage Artifacts
        shell: bash
        run: |
          V=${{ steps.versioning.outputs.version }}
          B_MOBILE=${{ steps.versioning.outputs.build_number_mobile }}
          B_TV=${{ steps.versioning.outputs.build_number_tv }}
          ./gradlew stageReleaseArtifacts \
            -PappVersionName="${{ steps.versioning.outputs.version }}" \
            -PappVersionCodeMobile="${{ steps.versioning.outputs.version_code_mobile }}" \
            -PappVersionCodeTv="${{ steps.versioning.outputs.version_code_tv }}"
          mkdir -p ../output
          APK_MOBILE=$(find build/staged/mobile -name '*.apk' | head -n1)
          APK_TV=$(find build/staged/tv -name '*.apk' | head -n1)
          AAB_MOBILE=$(find build/staged/mobile -name '*.aab' | head -n1)
          AAB_TV=$(find build/staged/tv -name '*.aab' | head -n1)
          if [[ -n "$APK_MOBILE" ]]; then
            mv "$APK_MOBILE" "../output/OpenVPNGateClient_mobile_${V}_build${B_MOBILE}.apk"
          fi
          if [[ -n "$APK_TV" ]]; then
            mv "$APK_TV" "../output/OpenVPNGateClient_tv_${V}_build${B_TV}.apk"
          fi
          if [[ -n "$AAB_MOBILE" ]]; then
            mv "$AAB_MOBILE" "../output/OpenVPNGateClient_mobile_${V}_build${B_MOBILE}.aab"
          fi
          if [[ -n "$AAB_TV" ]]; then
            mv "$AAB_TV" "../output/OpenVPNGateClient_tv_${V}_build${B_TV}.aab"
          fi
        working-directory: ./src

      - name: Create Git Tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const tag = '${{ steps.versioning.outputs.tag }}';
            const sha = context.sha;
            console.log(`Attempting to create tag: ${tag} at SHA: ${sha}`);
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: sha
              });
              console.log(`Successfully created tag ${tag}`);
            } catch (error) {
              if (error.status === 422) {
                console.log(`Tag ${tag} already exists. Skipping.`);
              } else {
                throw error;
              }
            }

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            output/OpenVPNGateClient_mobile_${{ steps.versioning.outputs.version }}_build${{ steps.versioning.outputs.build_number_mobile }}.apk
            output/OpenVPNGateClient_tv_${{ steps.versioning.outputs.version }}_build${{ steps.versioning.outputs.build_number_tv }}.apk
            output/OpenVPNGateClient_mobile_${{ steps.versioning.outputs.version }}_build${{ steps.versioning.outputs.build_number_mobile }}.aab
            output/OpenVPNGateClient_tv_${{ steps.versioning.outputs.version }}_build${{ steps.versioning.outputs.build_number_tv }}.aab
          token: ${{ secrets.GH_PAT }}
          tag: ${{ steps.versioning.outputs.tag }}
          name: "Release ${{ steps.versioning.outputs.tag }}"
          body: |
            Automated build from branch `${{ github.ref_name }}`
            App version: `${{ steps.versioning.outputs.version }}`
            
            What's new:
            ```
            ${{ steps.versioning.outputs.last_commit }}
            ```
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false

      - name: Push mobile version release
        id: push_mobile_version_release
        shell: bash
        env:
          LAST_COMMIT_MESSAGE: ${{ steps.versioning.outputs.last_commit }}
        run: |
          set -euo pipefail

          if [[ -z "${VERSIONS_API_BASE_URL:-}" || -z "${VERSIONS_API_KEY:-}" ]]; then
            echo "::error::VERSIONS_API_BASE_URL (repo variable) and VERSIONS_API_KEY (repo secret) must be configured."
            exit 1
          fi

          API_BASE="${VERSIONS_API_BASE_URL%/}"
          VERSION_NUMBER="${{ steps.versioning.outputs.version }}"
          BUILD_NUMBER="${{ steps.versioning.outputs.build_number_mobile }}"
          RELEASE_TAG="${{ steps.versioning.outputs.tag }}"
          CHANGELOG="${LAST_COMMIT_MESSAGE}"
          RELEASE_TYPE=0
          PLATFORM=0
          ASSET_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          ASSET_MOBILE_APK="OpenVPNGateClient_mobile_${VERSION_NUMBER}_build${BUILD_NUMBER}.apk"
          ASSET_MOBILE_AAB="OpenVPNGateClient_mobile_${VERSION_NUMBER}_build${BUILD_NUMBER}.aab"
          ASSET_MOBILE_APK_PATH="output/${ASSET_MOBILE_APK}"
          ASSET_MOBILE_AAB_PATH="output/${ASSET_MOBILE_AAB}"
          RELEASE_TITLE="Release mobile v${VERSION_NUMBER}-auto(${BUILD_NUMBER})"

          if [[ ! -f "$ASSET_MOBILE_APK_PATH" || ! -f "$ASSET_MOBILE_AAB_PATH" ]]; then
            echo "::error::Mobile artifacts not found: $ASSET_MOBILE_APK_PATH or $ASSET_MOBILE_AAB_PATH"
            exit 1
          fi

          APK_SIZE=$(stat -c%s "$ASSET_MOBILE_APK_PATH")
          AAB_SIZE=$(stat -c%s "$ASSET_MOBILE_AAB_PATH")
          APK_HASH=$(sha256sum "$ASSET_MOBILE_APK_PATH" | awk '{print $1}')
          AAB_HASH=$(sha256sum "$ASSET_MOBILE_AAB_PATH" | awk '{print $1}')

          payload=$(jq -n \
            --arg versionNumber "$VERSION_NUMBER" \
            --argjson buildNumber "$BUILD_NUMBER" \
            --arg name "$RELEASE_TITLE" \
            --argjson releaseType "$RELEASE_TYPE" \
            --argjson platform "$PLATFORM" \
            --arg changelog "$CHANGELOG" \
            --arg assetBaseUrl "$ASSET_BASE_URL" \
            --arg apkName "$ASSET_MOBILE_APK" \
            --arg aabName "$ASSET_MOBILE_AAB" \
            --arg apkHash "$APK_HASH" \
            --arg aabHash "$AAB_HASH" \
            --argjson apkSize "$APK_SIZE" \
            --argjson aabSize "$AAB_SIZE" \
            '{
              versionNumber:$versionNumber,
              buildNumber:$buildNumber,
              platform:$platform,
              name:$name,
              releaseType:$releaseType,
              changelog:$changelog,
              assets:[
                {name:$apkName,downloadUrl:($assetBaseUrl + "/" + $apkName),assetType:"apk",sizeBytes:$apkSize,contentHash:$apkHash},
                {name:$aabName,downloadUrl:($assetBaseUrl + "/" + $aabName),assetType:"aab",sizeBytes:$aabSize,contentHash:$aabHash}
              ]
            }')

          create_response=$(mktemp)
          create_status=$(curl -sS -o "$create_response" -w "%{http_code}" \
            -X POST "${API_BASE}/api/v1/versions" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${VERSIONS_API_KEY}" \
            --data "$payload")

          if [[ "$create_status" == "409" ]]; then
            echo "::warning::Mobile version ${VERSION_NUMBER} build ${BUILD_NUMBER} already exists."
            cat "$create_response"
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "version_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$create_status" != "200" ]]; then
            echo "::error::Failed to push mobile version. HTTP ${create_status}"
            cat "$create_response"
            exit 1
          fi

          VERSION_ID=$(jq -r '.data.id // empty' "$create_response")
          if [[ -z "$VERSION_ID" ]]; then
            echo "::error::Version created but response does not contain data.id"
            cat "$create_response"
            exit 1
          fi

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"

      - name: Auto-translate mobile release notes
        if: steps.push_mobile_version_release.outputs.created == 'true'
        shell: bash
        run: |
          set -euo pipefail

          API_BASE="${VERSIONS_API_BASE_URL%/}"
          VERSION_ID="${{ steps.push_mobile_version_release.outputs.version_id }}"
          SOURCE_LOCALE="en"

          mapfile -t TARGET_LANGUAGES < <(jq -r '.[]' <<< '${{ env.RELEASE_NOTES_AUTO_TRANSLATE_LANGUAGES_JSON }}')
          if [[ ${#TARGET_LANGUAGES[@]} -eq 0 ]]; then
            echo "::warning::No auto-translate target languages configured."
            exit 0
          fi

          for language_code in "${TARGET_LANGUAGES[@]}"; do
            echo "Auto-translating release notes to '${language_code}' for versionId=${VERSION_ID}"
            translate_response=$(mktemp)
            translate_status=$(curl -sS -o "$translate_response" -w "%{http_code}" \
              -X POST "${API_BASE}/api/v1/versions/${VERSION_ID}/localizations/${language_code}/auto-translate?sourceLocale=${SOURCE_LOCALE}" \
              -H "X-API-Key: ${VERSIONS_API_KEY}")

            if [[ "$translate_status" != "200" ]]; then
              echo "::error::Auto-translate failed for '${language_code}'. HTTP ${translate_status}"
              cat "$translate_response"
              exit 1
            fi
          done

      - name: Push tv version release
        id: push_tv_version_release
        shell: bash
        env:
          LAST_COMMIT_MESSAGE: ${{ steps.versioning.outputs.last_commit }}
        run: |
          set -euo pipefail

          if [[ -z "${VERSIONS_API_BASE_URL:-}" || -z "${VERSIONS_API_KEY:-}" ]]; then
            echo "::error::VERSIONS_API_BASE_URL (repo variable) and VERSIONS_API_KEY (repo secret) must be configured."
            exit 1
          fi

          API_BASE="${VERSIONS_API_BASE_URL%/}"
          VERSION_NUMBER="${{ steps.versioning.outputs.version }}"
          BUILD_NUMBER="${{ steps.versioning.outputs.build_number_tv }}"
          RELEASE_TAG="${{ steps.versioning.outputs.tag }}"
          CHANGELOG="${LAST_COMMIT_MESSAGE}"
          RELEASE_TYPE=0
          PLATFORM=1
          ASSET_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          ASSET_TV_APK="OpenVPNGateClient_tv_${VERSION_NUMBER}_build${BUILD_NUMBER}.apk"
          ASSET_TV_AAB="OpenVPNGateClient_tv_${VERSION_NUMBER}_build${BUILD_NUMBER}.aab"
          ASSET_TV_APK_PATH="output/${ASSET_TV_APK}"
          ASSET_TV_AAB_PATH="output/${ASSET_TV_AAB}"
          RELEASE_TITLE="Release tv v${VERSION_NUMBER}-auto(${BUILD_NUMBER})"

          if [[ ! -f "$ASSET_TV_APK_PATH" || ! -f "$ASSET_TV_AAB_PATH" ]]; then
            echo "::error::TV artifacts not found: $ASSET_TV_APK_PATH or $ASSET_TV_AAB_PATH"
            exit 1
          fi

          APK_SIZE=$(stat -c%s "$ASSET_TV_APK_PATH")
          AAB_SIZE=$(stat -c%s "$ASSET_TV_AAB_PATH")
          APK_HASH=$(sha256sum "$ASSET_TV_APK_PATH" | awk '{print $1}')
          AAB_HASH=$(sha256sum "$ASSET_TV_AAB_PATH" | awk '{print $1}')

          payload=$(jq -n \
            --arg versionNumber "$VERSION_NUMBER" \
            --argjson buildNumber "$BUILD_NUMBER" \
            --arg name "$RELEASE_TITLE" \
            --argjson releaseType "$RELEASE_TYPE" \
            --argjson platform "$PLATFORM" \
            --arg changelog "$CHANGELOG" \
            --arg assetBaseUrl "$ASSET_BASE_URL" \
            --arg apkName "$ASSET_TV_APK" \
            --arg aabName "$ASSET_TV_AAB" \
            --arg apkHash "$APK_HASH" \
            --arg aabHash "$AAB_HASH" \
            --argjson apkSize "$APK_SIZE" \
            --argjson aabSize "$AAB_SIZE" \
            '{
              versionNumber:$versionNumber,
              buildNumber:$buildNumber,
              platform:$platform,
              name:$name,
              releaseType:$releaseType,
              changelog:$changelog,
              assets:[
                {name:$apkName,downloadUrl:($assetBaseUrl + "/" + $apkName),assetType:"apk",sizeBytes:$apkSize,contentHash:$apkHash},
                {name:$aabName,downloadUrl:($assetBaseUrl + "/" + $aabName),assetType:"aab",sizeBytes:$aabSize,contentHash:$aabHash}
              ]
            }')

          create_response=$(mktemp)
          create_status=$(curl -sS -o "$create_response" -w "%{http_code}" \
            -X POST "${API_BASE}/api/v1/versions" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${VERSIONS_API_KEY}" \
            --data "$payload")

          if [[ "$create_status" == "409" ]]; then
            echo "::warning::TV version ${VERSION_NUMBER} build ${BUILD_NUMBER} already exists."
            cat "$create_response"
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "version_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$create_status" != "200" ]]; then
            echo "::error::Failed to push TV version. HTTP ${create_status}"
            cat "$create_response"
            exit 1
          fi

          VERSION_ID=$(jq -r '.data.id // empty' "$create_response")
          if [[ -z "$VERSION_ID" ]]; then
            echo "::error::TV version created but response does not contain data.id"
            cat "$create_response"
            exit 1
          fi

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"

      - name: Auto-translate tv release notes
        if: steps.push_tv_version_release.outputs.created == 'true'
        shell: bash
        run: |
          set -euo pipefail

          API_BASE="${VERSIONS_API_BASE_URL%/}"
          VERSION_ID="${{ steps.push_tv_version_release.outputs.version_id }}"
          SOURCE_LOCALE="en"

          mapfile -t TARGET_LANGUAGES < <(jq -r '.[]' <<< '${{ env.RELEASE_NOTES_AUTO_TRANSLATE_LANGUAGES_JSON }}')
          if [[ ${#TARGET_LANGUAGES[@]} -eq 0 ]]; then
            echo "::warning::No auto-translate target languages configured."
            exit 0
          fi

          for language_code in "${TARGET_LANGUAGES[@]}"; do
            echo "Auto-translating TV release notes to '${language_code}' for versionId=${VERSION_ID}"
            translate_response=$(mktemp)
            translate_status=$(curl -sS -o "$translate_response" -w "%{http_code}" \
              -X POST "${API_BASE}/api/v1/versions/${VERSION_ID}/localizations/${language_code}/auto-translate?sourceLocale=${SOURCE_LOCALE}" \
              -H "X-API-Key: ${VERSIONS_API_KEY}")

            if [[ "$translate_status" != "200" ]]; then
              echo "::error::TV auto-translate failed for '${language_code}'. HTTP ${translate_status}"
              cat "$translate_response"
              exit 1
            fi
          done
